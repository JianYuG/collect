server:
  port: 8090

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=public&stringtype=unspecified
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  # 启动时自动执行 schema.sql 建表（IF NOT EXISTS 保证幂等）
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: 

jwt:
  secret: MySecretKeyForJwtTokenGenerationWhichMustBeLongEnough2024AuthDemo
  expiration: 86400000
